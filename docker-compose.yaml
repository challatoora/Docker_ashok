services:
  catalogue:
    build:
      context: ./CATALOGUE
      dockerfile: Dockerfile
    image: catalogue:1.0.0
    container_name: catalogue
    depends_on: 
    - mongodb

  user:
    build:
      context: ./user
      dockerfile: Dockerfile
    image: user:1.0.0
    container_name: user
    depends_on:
    - redis

  Cart:
    build:
      context: ./Cart
      dockerfile: Dockerfile
    image: cart:1.0.0
    container_name: Cart
    depends_on:
    - redis

  shipping:
    build:
      context: ./shipping
      dockerfile: Dockerfile
    image: shipping:1.0.0
    container_name: shipping
    depends_on:
    - mysql

  frontend:
      build:
        context: ./frontend
        dockerfile: Dockerfile
      image: frontend:1.0.0
      container_name: usfrontender
      ports:
      - "80:80"
      depends_on:
      - catalogue
      - user
      - Cart
      - shipping
  


  mongodb:
    build:
      context: ./mongodb
      dockerfile: Dockerfile
    image: mongodb:1.0.0
    container_name: mongodb

  redis:
    image: redis:7.0
    container_name: redis

  mysql:
    build:
      context: ./mysql
      dockerfile: Dockerfile
    image: mysql:1.0.0
    container_name: mysql
  
  rabbitmq:
    image: rabbitmq:3
    environment: 
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    container_name: rabbitmq

networks:
  default:
    driver: bridge
    name: roboshop
    external: false