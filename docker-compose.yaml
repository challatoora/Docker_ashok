services:
  catalogue:
    build:
      context: .
      dockerfile: CATALOGUE.Dockerfile
    image: catalogue:1.0.0
    container_name: catalogue
    depends_on: 
    - mongodb

  mongodb:
    build:
      context: ./mongodb
      dockerfile: Dockerfile
    image: mongodb:1.0.0
    container_name: mongodb

networks:
  default:
    driver: bridge
    name: roboshop
    external: false