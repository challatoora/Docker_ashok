services:
  catalogue:
    build:
      context: ./CATALOGUE
      dockerfile: Dockerfile
    image: challatoor/catalogue:1.0.0
    container_name: catalogue
    depends_on: 
    - mongodb

  user:
    build:
      context: ./user
      dockerfile: Dockerfile
    image: challatoor/user:1.0.0
    container_name: user
    depends_on:
    - redis

  Cart:
    build:
      context: ./Cart
      dockerfile: Dockerfile
    image: challatoor/cart:1.0.0
    container_name: Cart
    depends_on:
    - redis

  shipping:
    build:
      context: ./shipping
      dockerfile: Dockerfile
    image: challatoor/shipping:1.0.0
    container_name: shipping
    depends_on:
    - mysql

  payment:
    build: ./payment
    image: challatoor/payment:1.0.0
    container_name: payment
    environment:
      CART_HOST: "Cart"
      CART_PORT: "8080"
      USER_HOST: "user"
      USER_PORT: "8080"
      AMQP_HOST: "rabbitmq"
      AMQP_USER: "roboshop"
      AMQP_PASS: "roboshop123"
    depends_on:
    - rabbitmq
    - Cart
    - user

  frontend:
      build:
        context: ./frontend
        dockerfile: Dockerfile
      image: challatoor/frontend:1.0.0
      container_name: usfrontender
      ports:
      - "80:80"
      depends_on:
      - catalogue
      - user
      - Cart
      - shipping
      - payment
  


  mongodb:
    build:
      context: ./mongodb
      dockerfile: Dockerfile
    image: challatoor/mongodb:1.0.0
    container_name: mongodb

  redis:
    image: redis:7.0
    container_name: redis

  mysql:
    build:
      context: ./mysql
      dockerfile: Dockerfile
    image: challatoor/mysql:1.0.0
    container_name: mysql
  
  rabbitmq:
    image: rabbitmq:3
    environment: 
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
    container_name: rabbitmq

networks:
  default:
    driver: bridge
    name: roboshop
    external: false