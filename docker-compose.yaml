services:
  catalogue:
    build:
      context: ./CATALOGUE
      dockerfile: Dockerfile
    image: catalogue:1.0.0
    container_name: catalogue
    depends_on: 
    - mongodb

  user:
    build:
      context: ./user
      dockerfile: Dockerfile
    image: user:1.0.0
    container_name: user
    depends_on:
    - redis
  
  frontend:
      build:
        context: ./frontend
        dockerfile: Dockerfile
      image: frontend:1.0.0
      container_name: usfrontender
      ports:
      - "80:80"
      depends_on:
      - catalogue
      - user

  mongodb:
    build:
      context: ./mongodb
      dockerfile: Dockerfile
    image: mongodb:1.0.0
    container_name: mongodb

  redis:
    image: redis:7.0
    container_name: redis

networks:
  default:
    driver: bridge
    name: roboshop
    external: false